# Backend
backend = "glx";

# VSync
vsync = true;

# Shadows
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;

# Opacity
inactive-opacity = 0.8;
active-opacity = 0.8;
frame-opacity = 0.7;
inactive-opacity-override = true;
blur-background = true;

# Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Blur
blur-method = "dual_kawase";
blur-strength = 7;

# Other
detect-client-opacity = true;
corner-radius = 15;

blur-background-exclude = [
  "class_g = 'Alacritty'",     # For terminal text (replace with your terminal's class if different)
  "class_g = 'URxvt'",
  "class_g = 'kitty'",
  "class_g = 'Code'",          # Example for VS Code or other editors
  "_GTK_FRAME_EXTENTS@:c"      # Excludes GTK frame borders to improve performance
];
