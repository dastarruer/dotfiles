# Backend
backend = "glx";

# VSync
vsync = true;

# Shadows
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;

# Opacity
inactive-opacity = 0.85;
active-opacity = 1.0;
frame-opacity = 0.7;
inactive-opacity-override = true;

# Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Blur
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;

# Transparency rules
opacity-rule = [
    "90:class_g = 'xfce4-terminal'"
];

# Force Windows to be Transparent
focus-exclude = [ ];
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Opacity for non-blurred windows
inactive-opacity-override = true;
inactive-dim = 0.2;
inactive-dim-fixed = true;

# Other
detect-client-opacity = true;
corner-radius = 10;

# Exclude text from being transparent
blur-background-fixed = [
    "class_g = 'Xfce4-terminal'",
    "class_g = 'URxvt'",
    "class_g = 'XTerm'",
    "class_g = 'Gnome-terminal'",
    "class_g = 'Konsole'"
];
