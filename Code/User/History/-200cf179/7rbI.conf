backend = "glx";
vsync = "opengl-swc";
paint-on-overlay = true;

# Shadow
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.7;

# Opacity
inactive-opacity = 0.9;
active-opacity = 0.9;
frame-opacity = 0.7;
inactive-opacity-override = true;

# Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Other
detect-client-opacity = true;
